{% extends 'base.html' %}

{% block conteudo %}

<h1>Funcionários</h1>

<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
  Novo Funcionário
</button>

<!-- Modal -->
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">Novo Funcionário</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form class="form-somar" action="{{url_for('triangulo')}}" method="post">
          <label for="input_nome">Nome:</label>
          <input id="input_nome" placeholder="Digite o nome" type="text" name="form-nome" class="form-control w-100">

          <label for="input_data">Data de nascimento:</label>
          <input id="input_data" placeholder="Digite a data de nascimento" type="date" name="form-nascimento" class="form-control w-100">

          <label for="input_cpf"> CPF: </label>
          <input id="input_cpf" placeholder="Digite o CPF" type="number" name="form-cpf" class="form-control w-100">

          <label for="input_email" >Email:</label>
          <input id="input_email" placeholder="Digite o Email" type="email" name="form-email" class="form-control w-100">

          <label for="input_senha" >Senha:</label>
          <input id="input_senha" placeholder="Digite a senha" type="password" name="form-senha" class="form-control w-100">

          <label for="input_cargo" >Cargo:</label>
          <input id="input_cargo" placeholder="Digite o Cargo" type="text" name="form-cargo" class="form-control w-100">

          <label for="input_salario" >Salário:</label>
          <input id="input_salario" placeholder="Digite o salário" type="number" name="form-salario" class="form-control w-100">

          <button type="submit" class="btn btn-info">Cadastrar</button>
        </form>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Understood</button>
      </div>
    </div>
  </div>
</div>


<table class="table">
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">Nome</th>
      <th scope="col">Data de Nascimento</th>
      <th scope="col">CPF</th>
      <th scope="col">Email</th>
      <th scope="col">Senha</th>
      <th scope="col">Cargo</th>
      <th scope="col">Salário</th>
      <th scope="col">Ações</th>
    </tr>
  </thead>

{% endblock %}
